<div class="{{schema.formGroup}} c-every-weekday c-segment">
  <div class="{{schema.check.root}} c-every-weekday-check">
    <input
      class="{{schema.check.field}} c-every-weekday-option"
      type="radio"
      [attr.id]="genId(mode.EVERY, segment.dayOfWeek)"
      [value]="mode.EVERY"
      [checked]="api.isEverySelected()"
      [disabled]="cronUI.isDisabled()"
      (change)="api.selectEvery()">

    <label
      class="{{schema.check.label}} c-every-weekday-option-label"
      [attr.for]="genId(mode.EVERY, segment.dayOfWeek)">

      {{localization.unix.day.every.label}}
    </label>
  </div>
</div>

<div class="{{schema.formGroup}} {{schema.formInline}} c-increment-weekday c-segment">
  <div class="{{schema.check.root}} c-increment-weekday-check">
    <input
      class="{{schema.check.field}} c-increment-weekday-option"
      type="radio"
      [attr.id]="genId(mode.INCREMENT, segment.dayOfWeek)"
      [value]="mode.INCREMENT"
      [checked]="api.isDayOfWeekIncrementSelected()"
      [disabled]="cronUI.isDisabled()"
      (change)="api.selectDayOfWeekIncrement()">

    <label
      class="{{schema.check.label}} c-increment-weekday-option-label"
      [attr.for]="genId(mode.INCREMENT, segment.dayOfWeek)">

      {{localization.unix.day.dayOfWeekIncrement.label1}}
    </label>
  </div>

  <select
    class="{{schema.formControl}} {{schema.mx1}} c-increment-weekday-every"
    [disabled]="api.isDayOfWeekIncrementControlsDisabled()"
    (change)="setDayOfWeekIncrementPrimary($event)">

    @for (item of daysOfWeekEvery; track item) {
      <option
        [value]="item.value"
        [selected]="api.getDayOfWeekIncrementPrimary() === item.value">
        {{item.value}}
      </option>
    }
  </select>

  <label
    class="c-increment-weekday-option-label2"
    [attr.for]="genId(mode.INCREMENT, segment.dayOfWeek)">
    {{localization.unix.day.dayOfWeekIncrement.label2}}
  </label>

  <select
    class="{{schema.formControl}} {{schema.mx1}} c-increment-weekday-from"
    [disabled]="api.isDayOfWeekIncrementControlsDisabled()"
    (change)="setDayOfWeekIncrementSecondary($event)">

    @for (item of daysOfWeek; track item) {
      <option
        [value]="item.value"
        [selected]="api.getDayOfWeekIncrementSecondary() === item.value">
        {{localizeLabel(item.label, this.localization.common.dayOfWeek)}}
      </option>
    }
  </select>
</div>

  <select

    (change)="setDayOfMonthIncrementPrimary($event)">

    @for (item of daysOfMonth; track item) {
      <option
        [value]="item.value"
        [selected]="api.getDayOfMonthIncrementPrimary() === item.value">

      </option>
    }
  </select>

  <label
    class="c-increment-monthday-option-label2"
    [attr.for]="genId(mode.INCREMENT, segment.dayOfMonth)">
    {{localization.unix.day.dayOfMonthIncrement.label2}}
  </label>

  <select
    class="{{schema.formControl}} {{schema.mx1}} c-increment-monthday-from"
    [disabled]="api.isDayOfMonthIncrementControlsDisabled()"
    (change)="setDayOfMonthIncrementSecondary($event)">

    @for (item of daysOfMonthEvery; track item) {
      <option
        [value]="item.value"
        [selected]="api.getDayOfMonthIncrementSecondary() === item.value">

        {{localizeLabel(item.label, localization.common.dayOfMonth)}}
      </option>
    }
  </select>

  <label
    class="c-increment-monthday-option-label3"
    [attr.for]="genId(mode.INCREMENT, segment.dayOfMonth)">
    {{localization.unix.day.dayOfMonthIncrement.label2}}
  </label>
</div>

<div class="{{schema.formGroup}} c-and-weekday c-segment">
  <div class="{{schema.check.root}} c-and-weekday-check">
    <input
      class="{{schema.check.field}} c-and-weekday-option"
      type="radio"
      [attr.id]="genId(mode.AND, segment.dayOfWeek)"
      [value]="mode.INCREMENT"
      [checked]="api.isDayOfWeekAndSelected()"
      [disabled]="cronUI.isDisabled()"
      (change)="api.selectDayOfWeekAnd()">

    <label
      class="{{schema.check.label}} c-and-weekday-option-label"
      [attr.for]="genId(mode.AND, segment.dayOfWeek)">

      {{localization.unix.day.dayOfWeekAnd.label}}
    </label>
  </div>

  <div class="{{schema.check.row}} c-and-weekday-list">
    @for (item of daysOfWeekCodes; track item) {
      <div
        class="{{schema.col3}} {{schema.colMd2}} c-and-weekday-item"
        [attr.item-value]="item.value">

        <div class="{{schema.check.root}} c-and-weekday-item-check">
          <input
            class="{{schema.check.field}} c-and-weekday-item-field"
            type="checkbox"
            [attr.id]="genId(mode.AND, segment.dayOfWeek + item.value)"
            [value]="item.value"
            [disabled]="api.isDayOfWeekAndControlsDisabled()"
            [checked]="api.isSelectedDayOfWeekAndValue(item.value)"
            (click)="api.selectDayOfWeekAndValue(item.value)">

          <label
            class="{{schema.check.label}} c-and-weekday-item-label"
            [attr.for]="genId(mode.AND, segment.dayOfWeek + item.value)">
            {{localizeLabel(item.label, localization.common.dayOfWeek)}}
          </label>
        </div>
      </div>
    }
  </div>
</div>
